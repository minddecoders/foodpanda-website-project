<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="top-bar">
    <span class="menu">☰</span>
    <h2>Home</h2>
    <div class="icons">
      <span>♡</span>
      <span>🛒</span>
    </div>
  </div>

  <div class="search-box">
    <input type="text"  placeholder=" Search for shops & restaurants">
  </div>
</header>

<!-- DEALS -->
<section class="section">
  <h3>Your daily deals</h3>
  <div class="scroll">
   <img  src="meal.png" alt="Meal for one">
   <img   src="dads.png" alt="Dad's Month 50% off">
   <img   src="win.png" alt="Win prizes">
  </div>
</section>

<!-- CUISINES -->
<section class="section">
  <h3>Cuisines</h3>
  <div class="grid">

    <div class="item">
      <img src="Air Fryer Rotisserie Chicken.jfif">
      <p>Chicken</p>
    </div>

    <div class="item">
      <img src="Pad Thai (ผัดไทย).jfif">
      <p>Thai</p>
    </div>

    <div class="item">
      <img src="The Steak That Might Ruin All Other Steaks For You.jfif">
      <p>Steak</p>
    </div>

    <div class="item">
      <img src="fruit.jfif">
      <p>Fruits</p>
    </div>

    <div class="item">
      <img src="burger.jfif">
      <p>Burgers</p>
    </div>

    <div class="item">
      <img src="Garden Salad_ A Fresh Summer Recipe.jfif">
      <p>Salad</p>
    </div>

    <div class="item">
      <img src="Korean Big Thali _ Hanjeongsik Full Course Meal.jfif">
      <p>Korean</p>
    </div>

    <div class="item">
      <img src="download.jfif">
      <p>Tea & Bubble Tea</p>
    </div>

  </div>
</section>

<!-- PRO PERKS -->
<section class="perks">
  <div>
    <h4>pro perks</h4>
    <p>Exclusive deals and free delivery</p>
  </div>
  <img src="deal.jfif" alt="pro perks">
</section><br>
<div class="pop">Popular Restaurants</div>
<script src="script.js"></script>
</body>
</html>
